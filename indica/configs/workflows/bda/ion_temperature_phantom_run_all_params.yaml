# An example of how to set up the hydra configs for an ion temperature phantom run.
# Modularising these configs makes it easier to mix and match different setups (even from the command line).
# 'defaults' says which config files to read
# individual settings can still be overwritten as with the 'optimisation'.

defaults:
  - model: default
  - optimisation: bo
  - plasma: default
  - plasma_profiler: default
  - priors: default
  - reader: phantom

optimisation:
  n_calls: 80
param_names:
  [
    "ion_temperature.y0",
    "ion_temperature.y1",
    "ion_temperature.wped",
    "ion_temperature.wcenter",
    "ion_temperature.peaking",
    "ion_temperature.shape1",
    "ion_temperature.shape2",
    "ion_temperature.shape3",
    "ion_temperature.shape4",


    "electron_density.y0",
    "electron_density.y1",
    "electron_density.wped",
    "electron_density.wcenter",
    "electron_density.peaking",
    "electron_temperature.y0",
    "electron_temperature.y1",
    "electron_temperature.wped",
    "electron_temperature.wcenter",
    "electron_temperature.peaking",


    #Change just these for now
    "impurity_density:ar.y0",
    "impurity_density:ar.y1",
    "impurity_density:ar.wped",
    "impurity_density:ar.wcenter",
    "impurity_density:ar.peaking",




    "neutral_density.y0",
    "neutral_density.y1",
    "neutral_density.wped",
    "neutral_density.wcenter",
    "neutral_density.peaking",



    "xrcs.scale_spectra",
  ]
diagnostics: ["xrcs", "cxff_tws_c", "cxff_pi", "efit", "blom_xy1"]
quant_to_optimise: ["xrcs.spectra_raw", "cxff_tws_c.ti", "cxff_pi.ti", "efit.wp"]

tstart: 0.05
tend: 0.06
dt: 0.01
